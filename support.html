<h1>屏幕监控助手 - 技术支持</h1>

<h2>常见问题</h2>

<h3>Q: 为什么检测不到画面变化？</h3>
<p>请确保目标窗口未被最小化，且处于可见状态。可尝试调低灵敏度（如1-2%）或缩短检测间隔。</p>

<h3>Q: 为何其他窗口出现在目标窗口上方也会触发提醒？</h3>
<p>监控指定窗口时，本软件使用 PrintWindow 技术直接读取窗口内容，不受遮挡影响。如仍受影响，建议使用屏幕区域监控模式。</p>

<h3>Q: 免费时长用完了怎么办？</h3>
<p>点击左侧"解锁时长"按钮观看广告，每次可增加2小时监控时长。</p>
