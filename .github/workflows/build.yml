name: Build MSIX
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        shell: pwsh
        run: .\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: ScreenMonitor
          path: ScreenMonitor.msix
