name: Build MSIX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build MSIX
        shell: pwsh
        run: |
          mkdir Package -Force
          mkdir Package\Assets -Force
          copy ScreenMonitor.exe Package\

          # Generate simple PNG logo using .NET
          $logoPath = "Package\Assets\StoreLogo.png"
          $bmp = New-Object System.Drawing.Bitmap(150, 150)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(26, 111, 181))
          $font = New-Object System.Drawing.Font("Arial", 36, [System.Drawing.FontStyle]::Bold)
          $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
          $g.DrawString("SM", [System.Drawing.PointF]::new(10, 40), $font, $brush)
          $bmp.Save($logoPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose(); $bmp.Dispose(); $font.Dispose(); $brush.Dispose()
          Write-Output "Logo created"

          $manifest = @"
<?xml version="1.0" encoding="utf-8"?>
<Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
         xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
         xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">
  <Identity Name="banzi.ScreenMonitor" Version="1.0.0.0" Publisher="CN=ScreenMonitor" ProcessorArchitecture="x64" />
  <Properties>
    <DisplayName>屏幕监控助手</DisplayName>
    <PublisherDisplayName>banzi工具</PublisherDisplayName>
    <Description>屏幕变化检测提醒工具</Description>
    <Logo>Assets\StoreLogo.png</Logo>
  </Properties>
  <Dependencies>
    <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
  </Dependencies>
  <Resources>
    <Resource Language="zh-CN" />
  </Resources>
  <Applications>
    <Application Id="App" Executable="ScreenMonitor.exe" EntryPoint="Windows.FullTrustApplication">
      <uap:VisualElements DisplayName="屏幕监控助手" Description="屏幕变化监控" BackgroundColor="#1a1a2e" Square150x150Logo="Assets\StoreLogo.png" Square44x44Logo="Assets\StoreLogo.png" />
    </Application>
  </Applications>
  <Capabilities>
    <rescap:Capability Name="runFullTrust" />
  </Capabilities>
</Package>
"@
          [System.IO.File]::WriteAllText("Package\AppxManifest.xml", $manifest, [System.Text.UTF8Encoding]::new($false))

          $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "MakeAppx.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Directory.Name -eq "x64" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) {
            $makeappx = Get-ChildItem -Path "C:\Program Files\Windows Kits\10\bin" -Filter "MakeAppx.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Output "MakeAppx: $makeappx"
          & $makeappx pack /d Package /p ScreenMonitor.msix /o

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ScreenMonitor
          path: ScreenMonitor.msix
